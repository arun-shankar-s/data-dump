<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal — Dashboard</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">AP</div>
      <span class="brand-name">Admin Portal</span>
    </div>
    <nav class="nav">
      <a href="dashboard.html" class="nav-item active">
        <svg class="icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        Dashboard
      </a>
      <a href="documents.html" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6z"/></svg>
        Documents
      </a>
      <a href="#" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
        Upload Document
      </a>
      <a href="#" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 4h16v4H4zM4 12h16v8H4z"/></svg>
        Bulk Upload
      </a>
      <a href="#" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a8 8 0 0116 0v2"/></svg>
        Users
      </a>
      <a href="#" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="3"/><path d="M2 20v-1a6 6 0 0110-4.5M14 20v-1a5 5 0 016-4.8"/></svg>
        User Groups
      </a>
      <a href="#" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="7" width="18" height="14" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        Departments
      </a>
      <a href="#" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 8v4l3 3M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Activity Log
      </a>
      <a href="#" class="nav-item">
        <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.9l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.9-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.6 1.7 1.7 0 00-1.9.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.9 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.9l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.9.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.9-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.9V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
        Settings
      </a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <header class="topbar">
      <button class="hamburger" id="sidebarToggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="topbar-spacer"></div>
      <button class="icon-btn" aria-label="Notifications">
        <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
        <span class="badge">3</span>
      </button>
      <div class="user-chip">
        <div class="avatar">A</div>
        <div class="user-meta">
          <span class="user-name">Admin</span>
          <span class="user-role">Administrator</span>
        </div>
      </div>
    </header>

    <main class="content">
      <div class="page-head">
        <h1>Dashboard</h1>
        <p class="subtle" id="welcomeMsg">Welcome back, Admin!</p>
      </div>

      <!-- STAT CARDS -->
      <section class="stat-grid" id="statGrid" aria-label="Summary statistics">
        <!-- injected by js/dashboard.js -->
      </section>

      <!-- CHART + RECENT DOCS -->
      <section class="panels">
        <div class="panel panel-chart">
          <h2>Documents by Department</h2>
          <div class="chart-wrap">
            <canvas id="deptChart" width="220" height="220" role="img" aria-label="Documents by department pie chart"></canvas>
            <ul class="legend" id="deptLegend"></ul>
          </div>
        </div>

        <div class="panel panel-table">
          <div class="panel-head">
            <h2>Recent Documents</h2>
          </div>
          <table class="doc-table">
            <thead>
              <tr>
                <th>Document Name</th>
                <th>Department</th>
                <th>Uploaded By</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recentDocsBody">
              <!-- injected by js/dashboard.js -->
            </tbody>
          </table>
          <button class="btn-link" id="viewAllDocs">View All Documents</button>
        </div>
      </section>
    </main>
  </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
